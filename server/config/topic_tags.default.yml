# Topic taxonomy — pan-African journalism baseline.
#
# Used by lib/copywriter/topic-tags.js (scoreArticle) as a coarse signal of
# what an article is about. Newsrooms can override this list by setting
# newsroom_profile.metadata.topic_tags — overrides are merged additively
# (see lib/newsroom-profile/merge-overrides.js).
#
# Curated for African newsroom journalism. Primary markets: South Africa,
# Zimbabwe, Zambia, Kenya. Keyword lists are deliberately mixed: a few
# universal terms ("election") plus continental specifics ("AfCFTA",
# "ECOWAS"). Editable freely — the file ships as a sensible default, not
# as a fixed taxonomy.
#
# Matching is case-insensitive on word boundaries. Multi-word phrases match
# as exact substrings. Scoring is matched-keyword occurrences per 100 words,
# capped at 1.0.

