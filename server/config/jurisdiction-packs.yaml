  audit_depth: light
  last_verified: '2026-05-18'
  data_law_summary:
    text: |
      Nigeria's Data Protection Act, 2023 (NDPA, in force from 12 June 2023) is the
      country's primary data-protection regime, replacing the earlier NDPR / NITDA
      framework. It establishes the Nigeria Data Protection Commission (NDPC) as
      the regulator. The General Application and Implementation Directive (GAID)
      2025 sets out compliance guidance for data controllers and processors,
      including cross-border-transfer mechanisms. NOTE: this pack has been
      verified against primary regulator sources but has not yet had the deep
      avoid-list research the ZA pack has received.
