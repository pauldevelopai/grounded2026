      GDPR governs personal-data processing in the EU. Cross-border transfers to
      non-adequate countries require Standard Contractual Clauses or a transfer-
      impact assessment. The Schrems II ruling (CJEU Case C-311/18, July 2020)
      tightened the bar specifically on US-resident processors handling EU
      personal data. NOTE: this pack has not yet been deep-researched.
