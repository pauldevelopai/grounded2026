# Jurisdiction packs for the Digital Security Audit.
#
# Each section is keyed by the newsroom's jurisdiction (set via
# newsroom_profile.metadata.jurisdiction). The audit consults the
# matching pack when scoring each external tool the newsroom has in
# its inventory.
#
# This file is editor-curated. Treat it as a living document — the
# audit's quality is downstream of its quality. Every non-trivial claim
# carries a `sources` list with the evidence backing it; the audit
# report renders the sources alongside each finding so the editor can
# verify the reasoning.
#
# Schema:
#   audit_depth        'deep' | 'light'. Deep packs have primary-source
#                      citations on every claim; light packs cite the
#                      jurisdiction's primary data-protection law and
#                      mark themselves as awaiting fuller research.
#   last_verified      ISO date the pack was last reviewed.
#   data_law_summary   { text, sources[] }. text appears in the audit
#                      report; sources cite the underlying law / guidance.
#   safe_residencies   ISO-2 country codes acceptable from this jurisdiction.
#   risky_residencies  ISO-2 country codes flagged from this jurisdiction.
#   tool_avoid_list    entries: { vendor?, tool_name?, severity, reason,
#                      sources[], last_verified }
#
# Source entries:
#   title              short label (renders in UI)
#   url                stable URL when one exists
#   evidence_kind      'primary_legislation' | 'regulator_guidance' |
#                      'regulator_action' | 'case_law' | 'reputable_press' |
#                      'industry_analysis' | 'vendor_documentation'
#   cite               (optional) specific section / date / quote
#
# Severity → risk band mapping:
#   safe / no flag → 'low'
#   warn           → 'medium'
#   avoid          → 'high'
#   prohibit       → 'critical'
#
# Per-newsroom overrides live at newsroom_profile.metadata.jurisdiction_overrides
# and merge with the pack at scoring time (allow_list wins; additional
# avoid_list entries append; same-key avoid_list entries replace).

# ──────────────────────────────────────────────────────────────────────
# Default — conservative fallback for unconfigured / unknown jurisdictions.
# ──────────────────────────────────────────────────────────────────────
default:
  audit_depth: light
  last_verified: '2026-05-18'
  data_law_summary:
    text: >
      No specific jurisdiction set. Treat every external tool conservatively:
      source-protection material should not leave the newsroom's perimeter, and
      third-country residencies (especially state-aligned jurisdictions) warrant
      caution.
    sources: []
  safe_residencies: [EU, GB]
  risky_residencies: [CN, RU, IR, KP]
  tool_avoid_list:
    - tool_name: TikTok
      severity: warn
      reason: ByteDance ownership creates a state-access risk for source material under PRC intelligence law.
      sources: []
      last_verified: '2026-05-18'
    - vendor: DeepSeek
      severity: avoid
      reason: Chinese-origin model with data resident on PRC servers; multiple national bans (Italy, Australia, Taiwan, Czech Republic) and open EU investigations.
      sources: []
      last_verified: '2026-05-18'

# ──────────────────────────────────────────────────────────────────────
# South Africa (ZA) — deep pack, primary pilot jurisdiction.
# ──────────────────────────────────────────────────────────────────────
ZA:
  audit_depth: deep
  last_verified: '2026-05-18'
  data_law_summary:
    text: |
      POPIA (Protection of Personal Information Act, 2013, No. 4 of 2013) is South
      Africa's primary data-protection regime, fully enforced from 1 July 2021. Section 72
      specifically governs cross-border transfers: personal information may only leave
      South Africa where the recipient is subject to comparable law / binding rules,
      with the data subject's informed consent, where the transfer is necessary for
      contractual performance, or for the data subject's benefit. Most cloud-hosted
      AI tools (ChatGPT, Microsoft Copilot, Google Gemini, etc.) process data on
      servers outside South Africa, which makes routine use of them a cross-border
      transfer event under POPIA. Amended regulations effective April 2025 sharpened
      breach-reporting and cross-border-transfer requirements. The Information
      Regulator is finalising a Guidance Note on Transborder Flows of Information
      (status: in consultation as of March 2026). South Africa's National Artificial
      Intelligence Policy Framework, published by the Department of Communications
      and Digital Technologies, signals a future risk-based AI supervisory model.
    sources:
      - title: 'POPIA (Act 4 of 2013)'
        url: https://www.gov.za/sites/default/files/gcis_document/201409/3706726-11act4of2013popi.pdf
        evidence_kind: primary_legislation
        cite: 'Section 72 — Transfers of personal information outside Republic'
      - title: 'Michalsons: Guidance Note on Cross-Border Transfers under POPIA'
        url: https://www.michalsons.com/blog/guidance-note-on-cross-border-transfers-to-from-south-africa/77246
        evidence_kind: reputable_press
        cite: 'Information Regulator finalising guidance note (March 2026)'
      - title: 'ITIF: South Africa Cross-Border Data Transfer Regulation'
        url: https://itif.org/publications/2025/06/02/south-africa-cross-border-data-transfer-regulation/
        evidence_kind: industry_analysis
        cite: 'June 2025'
      - title: 'VDT Attorneys: South Africa AI and Data Privacy Regulations'
        url: https://vdt.co.za/popia/south-africa-ai-and-data-privacy-regulations-the-complexities-of-ai-technologies-and-processingpersonal-information/
        evidence_kind: industry_analysis
  safe_residencies: [ZA, EU, GB]
  risky_residencies: [US, CN, RU, IR, KP]
  tool_avoid_list:
    - vendor: OpenAI
      tool_name: ChatGPT
      severity: warn
      reason: |
        US-resident processing brings the workflow within POPIA s.72 cross-border-
        transfer rules. The 2024 Reforming Intelligence and Securing America Act
        (RISAA) reauthorised FISA Section 702 and expanded its definition of
        "electronic communications service provider" to include remote-computing /
        cloud-service providers — meaning US-hosted cloud services that store or
        transmit communications are now explicitly within Section 702 surveillance
        authority. The consumer ChatGPT tier defaults to training on user input;
        the Enterprise tier opts out but residency remains US. For source-
        protection material, avoid pasting into ChatGPT; if used at all, require
        Enterprise tier with a written DPA and a transfer-impact assessment.
      sources:
        - title: 'POPIA s.72'
          url: https://www.gov.za/sites/default/files/gcis_document/201409/3706726-11act4of2013popi.pdf
          evidence_kind: primary_legislation
          cite: 'Section 72 — Transfers of personal information outside Republic'
        - title: 'Congressional Research Service: FISA Section 702 and the 2024 RISAA'
          url: https://www.congress.gov/crs-product/R48592
          evidence_kind: primary_legislation
          cite: 'RISAA expanded ECSP definition to remote-computing / cloud services (April 2024)'
        - title: 'Brennan Center: FISA Section 702 — 2026 Resource Page'
          url: https://www.brennancenter.org/our-work/research-reports/section-702-foreign-intelligence-surveillance-act-fisa-2026-resource-page
          evidence_kind: industry_analysis
        - title: 'Cloudgate: Private AI for South African Businesses'
          url: https://www.cloudgate.co.za/2026/04/07/private-ai-for-south-african-businesses-why-data-sovereignty-matters-more-than-ever/
          evidence_kind: industry_analysis
          cite: 'April 2026'
      last_verified: '2026-05-18'

    - vendor: DeepSeek
      severity: avoid
      reason: |
        Chinese-resident model; user data stored on PRC servers. China's 2017
        National Intelligence Law (Articles 7 and 14) obliges organisations to
        support state-intelligence work, including handing over data on lawful
        request without notice to data subjects. Italy's Garante (DPA) ordered
        DeepSeek out of the Italian app stores in January 2025 after the company
        failed to explain its data-handling practices under GDPR. Australia banned
        DeepSeek from all government devices and systems in February 2025 citing
        national-security risks. Taiwan banned it across the public sector. The
        Czech Republic banned it in public administration. France, Ireland,
        Belgium, the Netherlands and Germany have formal investigations open. A
        POPIA s.72 transfer to the PRC is unlikely to satisfy the "comparable law"
        threshold for any source-protection or personal data.
      sources:
        - title: 'TechCrunch: DeepSeek — countries and agencies that have banned the company''s tech'
          url: https://techcrunch.com/2025/02/03/deepseek-the-countries-and-agencies-that-have-banned-the-ai-companys-tech/
          evidence_kind: reputable_press
          cite: 'February 2025 — overview'
        - title: 'Sustainable Tech Partner: DeepSeek banned and permitted — list of government actions'
          url: https://sustainabletechpartner.com/news/deepseek-banned-and-permitted-in-which-counties-list-of-government-actions-vs-china-based-ai-software/
          evidence_kind: industry_analysis
        - title: 'Free-Codecs: DeepSeek privacy concerns and global bans explained'
          url: https://www.free-codecs.com/news/is-deepseek-safe-privacy-concerns-security-flaws-and-global-bans-explained.htm
          evidence_kind: industry_analysis
          cite: '2026 review'
      last_verified: '2026-05-18'

    - tool_name: TikTok
      severity: warn
      reason: |
        ByteDance ownership creates Chinese-state-access risk under PRC intelligence
        law. No formal South African ban exists as of mid-2026, but the SA
        government is in active consultation with regulators on social-media
        policy intervention — including potential age-verification regimes
        modelled on Australia's. Globally: Gabon banned TikTok in February 2026;
        the US forced restructuring into majority-American ownership in January
        2026 specifically to address national-security concerns. For newsrooms:
        do not use TikTok DMs to receive source contacts and do not upload
        unpublished material for editing; treat as a publish-only channel.
      sources:
        - title: 'BusinessTech: Facebook, TikTok, and Instagram ban on the cards for South Africa'
          url: https://businesstech.co.za/news/media/846195/facebook-tiktok-and-instagram-ban-on-the-cards-for-south-africa/
          evidence_kind: reputable_press
        - title: 'Wikipedia: Censorship of TikTok'
          url: https://en.wikipedia.org/wiki/Censorship_of_TikTok
          evidence_kind: reputable_press
        - title: 'Euronews: Which countries have banned TikTok and why'
          url: https://www.euronews.com/next/2025/01/17/which-countries-have-banned-tiktok-cybersecurity-data-privacy-espionage-fears
          evidence_kind: reputable_press
          cite: 'January 2025 overview'
      last_verified: '2026-05-18'

